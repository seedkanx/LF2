I was originally working on Steam Input integration (to resolve conflicts between Steam Input and my current gamepad implementation), but I’ve decided to pause that for now and shift my focus to network play. I’ve already spent more time on gamepad support than I originally planned.

What this means for players (starting from v2.14)
   – PC & Mac: You can still use a gamepad (but not for remote play). However, please disable Steam Input for this game to avoid conflicts (Steam Input should be disabled by default but could be accidentally enabled by an override).
   Steps: Steam Library → Right-click the game → Properties → Controller → Override for “[Game]” → Disable Steam Input.
   – Steam Deck: The built-in controls work using the official layout mapped to Player 1’s keyboard. However, external Bluetooth controllers for local multiplayer aren’t supported for now, because Steam Input interferes with the game’s native controller handling. Deck players can still play with others by joining network play.

Technical context (for those interested):
Steam Input is a Steam client feature that intercepts controller input and exposes a unified API. As far as I know, it’s also the only way to read the Steam Deck’s built-in gamepad input (when the gamepad isn’t emulating keyboard input). My game currently reads gamepad controllers via the native JavaScript GamePad APIs, which conflicts with Steam Input (since inputs are intercepted and redirected to steamClient.input.getControllers).
I had planned to migrate to Steam Input via steamworks.js, but the sheer number and complexity of device, platform, and setting combinations make implementation and testing extremely time-consuming. With so few references or examples of steamworks.js available, the risk of sinking significant time into something that could encounter unsolvable blockers and fail to ship is simply too high. Delaying network play further would only frustrate players, so I’m pausing this integration for now.
I’ll revisit Steam Input when a clearer path emerges (for example, a solid example project or tutorial). For now, my priority is delivering a solid network play experience.

Personal sharing:
Looking back on this update, I realize I underestimated the complexity of gamepad support, and it has taken a toll on my morale. I set out to solve a problem that could impress many players, but instead I often felt stuck. After putting in significant effort, I discovered the gamepad API conflicted with Steam Input, and the thought of reworking everything was painful. The frustration began to drain my momentum, and perhaps it is even a sign of burnout. That is part of why I decided not to spend more time on this issue.
Still, I know many of you continue to support me, and I am truly grateful. Ups and downs are part of indie life, and I will keep going, shifting my focus to network play and doing my best. Thank you for your support.

This update took longer than I expected. After receiving my SteamDeck and all my gamepad controllers, I initially thought adding gamepad support would be quick and easy. Since both gamepad-support and network-mode-improvement have received similar amounts of  requests, I decided to prioritize gamepad support first.
However, the work turned out to be more complex due to various corner cases. Because the game is written in JavaScript, I’m limited by the Gamepad API, which has some quirks, such as gamepads staying “asleep” until at least one gamepad button is pressed, no persistent UUID to identify the same gamepad after a reboot, and occasional missing part of internal ID strings that make recognition difficult. Switch Pro gamepads in particular were challenging: both of mine showed noticeably higher latency compared to other gamepads, and sometimes became unresponsive when multiple gamepads were connected. These seem to be low level API/driver issues, so there’s little I can do to fully fix them.
Another challenge is detecting whether the game is running on a SteamDeck. The Steamworks.js API I’m using struggles with this detection, so my plan to make the game launch in fullscreen by default on SteamDeck hasn’t been implemented yet. To make things trickier, there appears to be a driver layer that hides the SteamDeck’s built-in gamepads’s true ID, making it even harder to identify. For now, SteamDeck users can use the official control layout—which maps the gamepads inputs to keyboard keys—to play the game. (Yes, it’s a little odd that SteamDeck players will be selecting “Keyboard” in the control settings while actually using the build-in gamepads.) I plan to address this in the future, but network play improvements will take priority for now.
That said, PS4/PS5 and Xbox gamepads are now supported well. Other non-branded gamepads are also supported, though the experience may be less optimal. I hope this improves your playing experience. This version will first be released as a Beta, and your feedback will be very valuable in helping refine it further. Thank you for your patience, and I hope you enjoy the update!

我原本計劃處理 Steam Input 的整合（用來解決它與我現有手柄實作的衝突），但現在決定暫時擱置，將重點轉回到網路連線功能。我已經在手柄支援上花了比原先預期更多的時間。

對玩家的影響（自 v2.14 起）
   – PC 與 Mac： 仍然可以使用手柄（但不支援遠端遊玩）。不過請務必停用此遊戲的 Steam Input，以避免衝突（Steam Input 應該為預設停用，但亦有可能無意中被「覆蓋設定」啟用了）。
   步驟： Steam 遊戲庫 → 右鍵點選遊戲 → 「內容...」 (简中: 「属性...」) → 控制器 → 「[遊戲名稱]的替用配置」(简中: 「[游戏名称]的先决替代」) → 停用 Steam 輸入 (简中:「禁用 Steam 输入」)。
   – Steam Deck： 內建手柄可以透過官方配置對應到玩家P1的鍵盤操作。不過，目前不支援外接藍牙手柄進行本地多人遊戲，因為 Steam Input 會干擾遊戲的原生手柄處理。不過 Deck 玩家依然可以透過加入網路對戰和其他人一起遊玩。

技術背景（給有興趣的朋友）：
Steam Input 是 Steam 用戶端提供的一個功能，會攔截所有手柄輸入並轉換成統一的 API。就我所知，它也是唯一讀取 Steam Deck 內建手柄輸入的方法（當手柄沒有假裝成鍵盤時）。我的遊戲目前是透過 JavaScript 的原生 GamePad API 來讀取手柄，但這會和 Steam Input 衝突（因為輸入被攔截並轉送到 steamClient.input.getControllers）。

我原本計劃透過 steamworks.js 來把手柄讀取完全遷移到 Steam Input，但不同裝置與平台、設定的組合實在太多太複雜，實作和測試需要花非常多時間，而有關 steamworks.js 的參考資料和範例又很少。這樣投入的風險太高，最後甚至可能因為遇到沒有解法的障礙而無法完成。如果因此再拖慢網路對戰的進度，只會讓玩家更失望，所以我決定暫時擱置這部分的工作。
等到未來有更清晰的方向（例如有可靠的範例或教學）時，我會再重新考慮整合 Steam Input。目前我的首要目標，是先把網路對戰做好。

一些個人感想
回顧這次更新，我意識到自己低估了手掣支援的複雜性，這對我的士氣造成了影響。原本我希望能解決一個能讓許多玩家驚喜的問題，但過程中卻常常感到停滯不前。我投入了大量心力後才發現，gamepad API 與 Steam Input 存在衝突，而必須推翻重做的想法令人十分痛苦。這種挫折感開始消磨我的動力，也許這甚至是倦怠的徵兆。這正是我決定不再在這個問題上花更多時間的原因之一。
不過，我知道仍有許多人一直支持著我，對此我由衷感激。起伏本來就是獨立開發的一部分，我會繼續前進，把重心轉向網絡對戰，並盡自己最大的努力。感謝大家的支持。

這次更新花費的時間比我預期的長。收到我的 SteamDeck 與所有遊戲手柄後，我原以為加入遊戲手柄支援會很快也很簡單。由於遊戲手柄支援與網路模式改進的請求量差不多，我決定先優先處理遊戲手柄。
然而，實作過程比想像中複雜，要處理許多特殊情況。由於遊戲是用 JavaScript 編寫，我受到 Gamepad API 的一些限制，例如手柄在按下任何按鍵前會處於「休眠」狀態、沒有固定的 UUID 來識別重啟後的同一手柄，以及有時內部的ID字串會忽然缺少一部分，導致辨識困難。Switch Pro 手柄尤其麻煩，我手上兩個與電腦連接後延遲明顯高於其他手柄，而且與多手柄同時使用時有時會變成按鍵全無反應。這些似乎是底層 API 或驅動的問題，因此我無法完全修復。
另一個挑戰是偵測遊戲是否在 SteamDeck 上運行。我使用的 Steamworks.js API 在這方面不太順利，因此原本打算讓遊戲在 SteamDeck 上預設全螢幕啟動的計劃暫時無法實現。更棘手的是，似乎有一層驅動程式會隱藏 SteamDeck 內建手柄的真實 ID，使辨識變得更加困難。暫時的解決方案是，SteamDeck 玩家可以使用官方控制配置（將手柄按鍵對應為鍵盤按鍵）來遊玩。（是的，這確實有點奇怪——SteamDeck 玩家在控制設定中選擇的是「鍵盤」，但實際上用的是內建手柄。）我計劃未來再解決這個問題，不過目前會優先處理網路對戰的改進。
不過，PS4/PS5 和 Xbox 手柄現在已能良好支援，其他無品牌手柄也能使用，但體驗可能不如前者理想。希望這能提升你的遊戲體驗。本版本將先推出 Beta 版，誠摯希望你能提供寶貴的意見來幫助我進一步改進。感謝你的耐心等待，也希望你喜歡這次的更新！

   – 先按 →，再同時按 D → J，不會再觸發奇怪的衝刺+防禦組合動作。（此問題在修復前，某些鍵盤可能因多鍵輸入時Jam鍵而無法重現。不過我相信這項修正對未來的手掣體驗有很大幫助）
   – 跑步（→ →）後，同時按 J 與 A，現在會正確觸發衝跳攻（原本會變成跑攻，跳躍被忽略，因為攻擊鍵先被判定）
   – 如果 J 或 A 已觸發動作，該按鍵將被消耗，不會再觸發其他動作（與原版 LF2 不同）
   – 但 A 鍵若用於翻滾+撿物品，則不會被消耗，避免拾取道具時無意中阻止招式觸發
• 修復在小部分 Windows 電腦上啟動時出現的「A JavaScript error occurred in the main process...」錯誤，方法是透過在 SteamWorks 設定中加入 Visual C++ Redistributable 套件。
• 修正遊戲在生存模式第25關當機的問題。
• 新增血條閃爍效果（當角色正在被治療時）。
• 修正撿物品時被打中導致道具卡在空中無反應的問題。
• 潛在修復撿物品同時被打導致遊戲閃退的問題（花了幾小時仍無法重現，但發現可能的根本原因並加上防禦性處理。若問題仍在，請回報）。
• 修正 Julian 使用上鉤拳攻擊時會跳得異常高的問題。
• 修正 Henry 在奔跑中向後射擊時，武器卡在空中的問題。
• 修正持石頭與 John 的防護壁碰撞時，石頭會消失再瞬間出現在手上的錯誤（應為掉落在地上）。
• 修正 Alt+Tab 切出再切回遊戲時，遊戲仍判定 Alt 鍵被按住的問題。
• 所有關卡成就現在會自動解鎖較低難度。例如達成 Stage 3 - Difficult，也會同時獲得 Normal 與 Easy。首次啟動 v2.12 時會自動檢查並補發未取得的低難度成就。
• 潛在修復某些鍵盤右 Shift 鍵無效的問題（我無法自行驗證，但現在若系統無法區分左右 Shift，將預設為右 Shift。因為修復前該鍵本來就無法使用，所以不會有副作用）。
• 功能鍵變更：
   – ESC 現在也可作為暫停鍵
   – 暫停 + Q 現在可重新開始遊戲
   – 暫停 + N 現在可逐幀播放（Step Pause）
   – 暫停 + H 現在可隱藏暫停與說明文字
   – 暫停 + Z 現在可切換縮放
   此更改是因有玩家反映功能鍵操作不便，部分鍵盤需按 Fn 鍵才可觸發功能鍵。
• 設定按鈕現在可收合/展開，因為其使用頻率不到 1%，但佔用畫面空間。
• Windows 下的遊戲圖示現在看起來更好一些。但在工作管理員中仍顯示 Electron 的預設圖示。我嘗試修正了 2 小時仍未能解決。
• 修正更換帳號並重新啟動遊戲時的成就問題：
   – 成就可能在帳號之間洩漏
   – 成就數量顯示錯誤，需重新啟動或取得新成就才會更新
• 加入成就的中文名稱與描述。
• 修正某些外國鍵盤配置中「.」未被識別為「Period」而導致解鎖碼無法正確輸入的問題。
• 新增Debug Log（保存在本機，大小始終維持在 1MB 以下），以協助調查白屏問題或其他較難以察覺的問題。
• 小修正與調整：
   – 網路對戰房間列表的刷新按鈕移至左上角，避免與設定按鈕重疊
   – 暫停時背景不再滾動
   – 全螢幕模式下，畫面底部的灰線已移除
   – 修正某些結束場景下暫停/加速狀態會殘留的問題
   – 修正了 Jan 的招式列表中的英文錯字
   – 為 Julian 的「殘影」招式補上「MP：5」的說明
   – 在基本動作說明中，將「後空翻」改為「受身」，這是遊戲中更常見的用語

由於本次更新動到許多核心程式碼，V2.12 將先作為 Beta 版本釋出，確認穩定後才會設為預設版本。
原本打算用 2～3 天修 bug，之後改善網路對戰。但最近一些私人瑣事讓我難以長時間專注，因此利用零碎時間先修復最嚴重與最多人反映的問題。我也在等 Steam Deck 寄到，之後會再處理手掣支援。如果中間發現手掣問題可以快速修正，我會先處理。感謝各位支持，請繼續關注！

• 修正角色數值問題，現在每位角色的移動屬性各不相同。

    const englishButton = document.getElementById('btn-en');
    const chineseButton = document.getElementById('btn-zh');
    const contentDiv = document.getElementById('content');

    function showEnglish() {
      englishButton.focus();
      document.getElementById('content').innerHTML = englishUpdatelog;
      document.getElementById('title').innerHTML = 'LF2 - Update Log';
      englishButton.classList.add('selected');
      chineseButton.classList.remove('selected');
      contentDiv.scrollTop = 0;
    }

    function showChinese() {
      chineseButton.focus();
      document.getElementById('content').innerHTML = chineseUpdatelog;
      document.getElementById('title').innerHTML = 'LF2 - 更新日誌';
      chineseButton.classList.add('selected');
      englishButton.classList.remove('selected');
      contentDiv.scrollTop = 0;
    }

    document.addEventListener('keydown', function(event) {
      if (event.key === 'Escape') {
        pressEsc();
      } else if (event.key === 'ArrowUp') {
        pressUp();
      } else if (event.key === 'ArrowDown') {
        pressDown();
      } else if (event.key === 'ArrowLeft') {
        pressLeft();
      } else if (event.key === 'ArrowRight') {
        pressRight();
      }
    });

    // Show English by default
    showEnglish();

    function pressUp() {
      contentDiv.scrollTop -= 500;
    }
    function pressDown() {
      contentDiv.scrollTop += 500;
    }
    function pressLeft() {
      showEnglish();
    }
    function pressRight() {
      showChinese();
    }
    function pressEsc() {
      window.close();
    }

    window.addEventListener("gamepadconnected", (evt) => {
        addGamepad(evt.gamepad);
    });
    loopStarted = false;
    function addGamepad(gamepad) {
        if (!loopStarted) {
            requestAnimationFrame(updateStatus);
            loopStarted = true;
        }
    }

    let escDown = false;
    let upDown = false;
    let downDown = false;
    let leftDown = false;
    let rightDown = false;
    function updateStatus() {
        let escDown0 = escDown;
        let upDown0 = upDown;
        let downDown0 = downDown;
        let leftDown0 = leftDown;
        let rightDown0 = rightDown;
        escDown = false;
        upDown = false;
        downDown = false;
        leftDown = false;
        rightDown = false;

        for (const gamepad of navigator.getGamepads()) {
            if (!gamepad) continue;

            for (const [i, button] of gamepad.buttons.entries()) {
                if (button.pressed) {
                    if (i==12) {
                      if (!upDown0) pressUp();
                      upDown = true;
                    }
                    if (i==13) {
                      if (!downDown0) pressDown();
                      downDown = true;
                    }
                    if (i==14) {
                      if (!leftDown0) pressLeft();
                      leftDown = true;
                    }
                    if (i==15) {
                      if (!rightDown0) pressRight();
                      rightDown = true;
                    }
                    if (i==9) {
                      if (!escDown0) pressEsc();
                      escDown = true;
                    }
                }
            }

            for (const [i, axis] of gamepad.axes.entries()) {
                if (axis>.5) {
                    if (i==1) {
                      if (!downDown0) pressDown();
                      downDown = true;
                    }
                    if (i==0) {
                      if (!rightDown0) pressRight();
                      rightDown = true;
                    }
                }

                if (axis<-.5) {
                    if (i==1) {
                      if (!upDown0) pressUp();
                      upDown = true;
                    }
                    if (i==0) {
                      if (!leftDown0) pressLeft();
                      leftDown = true;
                    }
                }
            }
        }
        requestAnimationFrame(updateStatus);
    }
  </script>
